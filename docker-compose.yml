services:
  postgres:
    image: postgres:16-alpine
    container_name: cpt-postgres
    environment:
      POSTGRES_DB: capacityplanning
      POSTGRES_USER: cpt_user
      POSTGRES_PASSWORD: cpt_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cpt_user -d capacityplanning"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cpt-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/capacityplanning
      SPRING_DATASOURCE_USERNAME: cpt_user
      SPRING_DATASOURCE_PASSWORD: cpt_pass
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cpt-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
